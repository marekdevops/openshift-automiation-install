---
# =============================================================================
# Task: Wczytaj wygenerowane zmienne (MAC adresy) z clusters/.generated/
# =============================================================================
# Użycie (z playbooka w katalogu głównym projektu):
#   - name: Wczytaj wygenerowane MAC adresy
#     ansible.builtin.include_tasks: tasks/load-generated-vars.yml
#
# Użycie (z playbooka w podkatalogu, np. cdrom/):
#   - name: Wczytaj wygenerowane MAC adresy
#     ansible.builtin.include_tasks: ../tasks/load-generated-vars.yml
#
# Efekt:
#   - Jeśli clusters/.generated/<cluster_name>.yml istnieje:
#     → wczytuje node_macs i scala z nodes (nadpisuje puste MAC)
#   - Jeśli nie istnieje — brak zmian, playbook działa na danych ze źródła
# =============================================================================

- name: Sprawdź czy wygenerowany plik z MAC adresami istnieje
  ansible.builtin.stat:
    path: "{{ lookup('env', 'PWD') }}/clusters/.generated/{{ cluster_name }}.yml"
  register: _generated_vars_stat

- name: Wczytaj MAC adresy z wygenerowanego pliku
  ansible.builtin.include_vars:
    file: "{{ lookup('env', 'PWD') }}/clusters/.generated/{{ cluster_name }}.yml"
  when: _generated_vars_stat.stat.exists

- name: Scala nodes z MAC adresami z wygenerowanego pliku
  ansible.builtin.set_fact:
    nodes: >-
      {%- set result = [] -%}
      {%- for n in nodes -%}
        {%- set mac = (node_macs | default({}))[n.name] | default(n.mac | default('')) -%}
        {%- set _ = result.append(n | combine({'mac': mac})) -%}
      {%- endfor -%}
      {{ result }}
  when:
    - _generated_vars_stat.stat.exists
    - node_macs is defined

- name: "Info — MAC adresy wczytane z wygenerowanego pliku"
  ansible.builtin.debug:
    msg: "Wczytano MAC adresy z clusters/.generated/{{ cluster_name }}.yml"
  when: _generated_vars_stat.stat.exists

- name: "Info — brak wygenerowanego pliku"
  ansible.builtin.debug:
    msg: |
      clusters/.generated/{{ cluster_name }}.yml nie istnieje.
      Uruchom najpierw: ansible-playbook create-virt-env.yml -e @clusters/{{ cluster_name }}.yml
  when: not _generated_vars_stat.stat.exists
