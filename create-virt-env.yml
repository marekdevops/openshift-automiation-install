---
# =============================================================================
# Playbook: Tworzenie maszyn wirtualnych dla środowiska
# =============================================================================
# Użycie:
#   ansible-playbook create-virt-env.yml -e @clusters/ocp1.yml
#
# Logika:
#   - Istniejące VM NIE są modyfikowane (nawet jeśli parametry się różnią)
#   - Tylko NOWE VM są tworzone z szablonu
#   - Po utworzeniu MAC adresy są zapisywane do pliku konfiguracyjnego
#   - Na końcu wyświetlane są informacje o VM i MAC adresach
# =============================================================================

- name: Tworzenie maszyn wirtualnych
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Ścieżka do pliku konfiguracyjnego (przekazana przez -e @clusters/xxx.yml)
    cluster_config_file: "{{ lookup('env', 'PWD') }}/clusters/{{ cluster_name }}.yml"

  tasks:
    # =========================================================================
    # Krok 1: Walidacja
    # =========================================================================
    - name: "=== TWORZENIE VM DLA KLASTRA {{ cluster_name }} ==="
      ansible.builtin.debug:
        msg: "Namespace: {{ namespace }}, Nodes: {{ nodes | length }}"

    # =========================================================================
    # Krok 2: Pobierz listę istniejących VM w namespace
    # =========================================================================
    - name: Pobierz listę istniejących VM
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        namespace: "{{ namespace }}"
      register: existing_vms

    - name: Zbuduj listę nazw istniejących VM
      ansible.builtin.set_fact:
        existing_vm_names: "{{ existing_vms.resources | map(attribute='metadata.name') | list }}"

    - name: Pokaż istniejące VM
      ansible.builtin.debug:
        msg: "Istniejące VM w namespace {{ namespace }}: {{ existing_vm_names }}"

    # =========================================================================
    # Krok 3: Filtruj tylko nowe VM (których jeszcze nie ma)
    # =========================================================================
    - name: Określ które VM trzeba utworzyć
      ansible.builtin.set_fact:
        vms_to_create: "{{ nodes | rejectattr('name', 'in', existing_vm_names) | list }}"

    - name: Pokaż VM do utworzenia
      ansible.builtin.debug:
        msg: "VM do utworzenia: {{ vms_to_create | map(attribute='name') | list }}"

    - name: Pokaż VM pominięte (już istnieją)
      ansible.builtin.debug:
        msg: "VM pominięte (już istnieją): {{ nodes | selectattr('name', 'in', existing_vm_names) | map(attribute='name') | list }}"

    # =========================================================================
    # Krok 4: Utwórz nowe VM z szablonu
    # =========================================================================
    - name: Utwórz nowe maszyny wirtualne
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'templates/vm-worker-large.yaml.j2') }}"
      vars:
        vm_name: "{{ item.name }}"
        vm_cpu_sockets: "{{ item.cpu_sockets | default(vm_defaults.cpu_sockets) }}"
        vm_memory: "{{ item.memory | default(vm_defaults.memory) }}"
        vm_disk_size: "{{ item.disk_size | default(vm_defaults.disk_size) }}"
        vm_max_cpu_sockets: "{{ item.max_cpu_sockets | default(vm_defaults.max_cpu_sockets) }}"
        vm_max_memory: "{{ item.max_memory | default(vm_defaults.max_memory) }}"
      loop: "{{ vms_to_create }}"
      loop_control:
        label: "{{ item.name }}"
      register: created_vms
      when: vms_to_create | length > 0

    # =========================================================================
    # Krok 5: Poczekaj na utworzenie DataVolumes (provisioning dysków)
    # =========================================================================
    - name: Poczekaj na zakończenie provisioningu DataVolumes
      kubernetes.core.k8s_info:
        api_version: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        namespace: "{{ namespace }}"
        name: "{{ item.name }}-rootdisk"
      register: dv_status
      until: >
        dv_status.resources | length > 0 and
        (dv_status.resources[0].status.phase | default('') == 'Succeeded' or
         dv_status.resources[0].status.phase | default('') == 'WaitForFirstConsumer')
      retries: 30
      delay: 10
      loop: "{{ vms_to_create }}"
      loop_control:
        label: "{{ item.name }}-rootdisk"
      when: vms_to_create | length > 0

    # =========================================================================
    # Krok 6: Sprawdź czy VMI (instancje) się uruchomiły
    # =========================================================================
    - name: Poczekaj na uruchomienie VMI
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        namespace: "{{ namespace }}"
        name: "{{ item.name }}"
      register: vmi_status
      until: >
        vmi_status.resources | length > 0 and
        vmi_status.resources[0].status.phase | default('') == 'Running'
      retries: 60
      delay: 10
      loop: "{{ vms_to_create }}"
      loop_control:
        label: "{{ item.name }}"
      when: vms_to_create | length > 0

    - name: Walidacja — pokaż status utworzonych VM
      ansible.builtin.debug:
        msg: "VM {{ item.name }} uruchomiona pomyślnie (status: Running)"
      loop: "{{ vms_to_create }}"
      loop_control:
        label: "{{ item.name }}"
      when: vms_to_create | length > 0

    # =========================================================================
    # Krok 7: Poczekaj az kazdy VMI rozglosi MAC w status.interfaces[vlan214]
    #         (dotyczy wszystkich nodow, nie tylko nowo utworzonych)
    # =========================================================================
    - name: Poczekaj az VMI rozglosi MAC w status (vlan214)
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        namespace: "{{ namespace }}"
        name: "{{ item.name }}"
      register: vmi_mac_wait
      until: >
        vmi_mac_wait.resources | length > 0 and
        (vmi_mac_wait.resources[0].status.interfaces | default([])
          | selectattr('name', 'defined')
          | selectattr('name', 'equalto', 'vlan214')
          | map(attribute='mac') | list | first | default('')) | length > 0
      retries: 30
      delay: 5
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    # =========================================================================
    # Krok 8: Zbierz MAC adresy z VMI (po Krok 7 mamy gwarancje ze sa)
    # =========================================================================
    - name: Pobierz wszystkie VMI (fresh)
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        namespace: "{{ namespace }}"
      register: all_vmis

    - name: Inicjalizuj mape MAC i liste nazw nodow
      ansible.builtin.set_fact:
        vm_mac_map: {}
        node_names: "{{ nodes | map(attribute='name') | list }}"

    - name: Zbierz MAC z kazdego VMI
      ansible.builtin.set_fact:
        vm_mac_map: "{{ vm_mac_map | combine({item.metadata.name: collected_mac}) }}"
      vars:
        collected_mac: >-
          {{ item.status.interfaces | default([])
             | selectattr('name', 'defined')
             | selectattr('name', 'equalto', 'vlan214')
             | map(attribute='mac') | list | first | default('') }}
      loop: "{{ all_vmis.resources | default([]) }}"
      loop_control:
        label: "{{ item.metadata.name | default('unknown') }}"
      when:
        - item.metadata is defined
        - item.metadata.name is defined
        - item.metadata.name in node_names

    # =========================================================================
    # Krok 9: Walidacja — kazdy node MUSI miec MAC. Inaczej fail loudly.
    # =========================================================================
    - name: Walidacja — kazdy node ma MAC
      ansible.builtin.assert:
        that:
          - vm_mac_map[item.name] is defined
          - vm_mac_map[item.name] | length > 0
        fail_msg: |
          BRAK MAC dla {{ item.name }}. Mozliwe przyczyny:
            - VMI nie wstal poprawnie (sprawdz: oc get vmi {{ item.name }} -n {{ namespace }})
            - Interfejs vlan214 nie zostal podpiety (Multus problem)
            - Brak NetworkAttachmentDefinition {{ multus_network }}
          Diagnoza:
            oc get vmi {{ item.name }} -n {{ namespace }} -o jsonpath='{.status.interfaces}'
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    # =========================================================================
    # Krok 10: Surgical update MAC w clusters/<name>.yml
    #          - Tylko linie 'mac: "..."' w sekcji nodes sa zmienione
    #          - Komentarze, niestandardowe pola (pull_secret_file,
    #            ssh_public_key_file, custom vars) — zachowane nietkniete
    # =========================================================================
    - name: Zaktualizuj MAC w pliku konfiguracyjnym (per node, surgical)
      ansible.builtin.replace:
        path: "{{ cluster_config_file }}"
        regexp: '(^[ \t]*-\s+name:\s+{{ item.name | regex_escape }}\b[\s\S]*?^[ \t]*mac:\s*")[^"]*'
        replace: '\g<1>{{ vm_mac_map[item.name] }}'
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ vm_mac_map[item.name] }}"

    # =========================================================================
    # Krok 11: Set host fact `nodes_with_mac` dla orkiestracji
    #          - Potrzebne gdy install-cluster.yml chaini ten playbook z
    #            generate-ocp-agent-iso.yml w jednym procesie. Extra vars (-e
    #            z @clusters/ocp1.yml) sa migawka w pamieci i NIE odswiezaja
    #            sie po Krok 10 (file update). Bez tego facta agent-config
    #            generuje sie z pustymi MAC.
    #          - Standalone run: nodes_with_mac nieuzywane (kolejne wywolanie
    #            ansible-playbook laduje swiezy plik), template fallbackuje
    #            do `nodes` ktore jest swieze z -e.
    # =========================================================================
    - name: Inicjalizuj nodes_with_mac
      ansible.builtin.set_fact:
        nodes_with_mac: []

    - name: Buduj nodes_with_mac (host fact, persists across plays)
      ansible.builtin.set_fact:
        nodes_with_mac: "{{ nodes_with_mac + [item | combine({'mac': vm_mac_map[item.name]})] }}"
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    # =========================================================================
    # Krok 12: Podsumowanie
    # =========================================================================
    - name: "=== TABELA NODOW ==="
      ansible.builtin.debug:
        msg: "{{ item.name }} | {{ item.hostname }} | {{ item.role }} | MAC: {{ vm_mac_map[item.name] }} | IP: {{ item.ip }}"
      loop: "{{ nodes_with_mac }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "=== SUKCES ==="
      ansible.builtin.debug:
        msg: |
          Plik konfiguracyjny zaktualizowany chirurgicznie: {{ cluster_config_file }}
          (komentarze i niestandardowe pola — zachowane)

          Nastepne kroki:
          1. Sprawdz IP dla kazdego node-a w {{ cluster_config_file }}

          2. Wygeneruj ISO:
             ansible-playbook generate-ocp-agent-iso.yml -e @clusters/{{ cluster_name }}.yml

          3. Podepnij ISO i zrestartuj VM:
             ansible-playbook cdrom/attach-iso.yml -e @clusters/{{ cluster_name }}.yml

          4. Monitoruj instalacje:
             ansible-playbook wait-ocp-install.yml -e @clusters/{{ cluster_name }}.yml
