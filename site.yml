---
# =============================================================================
# Master playbook: Pełna instalacja OpenShift od zera do działającego klastra
# =============================================================================
# Użycie:
#   ansible-playbook site.yml -e @clusters/ocp1.yml
#
# Wymagania:
#   - oc zalogowany do klastra (OpenShift Virtualization)
#   - openshift-install binary w /usr/local/bin/openshift-install
#   - pull-secret.json w ~/.openshift/pull-secret.json
#   - virtctl w PATH
#
# Etapy:
#   1. Tworzenie VM (create-virt-env.yml)
#   2. Generowanie ISO (generate-ocp-agent-iso.yml)
#   3. Upload ISO + podpięcie CDROM + start VM (cdrom/attach-iso.yml)
#      Boot order: rootdisk=1, cdrom=2
#      Pusty rootdisk → UEFI odpada do CDROM → instalacja
#      Po instalacji reboot → rootdisk ma GRUB → bootuje z dysku automatycznie
#   4. Monitorowanie instalacji — bootstrap + complete (wait-ocp-install.yml)
# =============================================================================

# Krok 1: Tworzenie VM
- name: "=== KROK 1/5: TWORZENIE VM ==="
  ansible.builtin.import_playbook: create-virt-env.yml

# Krok 2: Generowanie ISO
- name: "=== KROK 2/5: GENEROWANIE ISO ==="
  ansible.builtin.import_playbook: generate-ocp-agent-iso.yml

# Krok 3: Upload ISO, podpięcie CDROM, start VM
# Boot order: rootdisk=1, cdrom=2
# Pusty rootdisk nie ma bootloadera → UEFI odpada do CDROM → instalacja
# Po instalacji i rebootcie → rootdisk ma GRUB → bootuje z dysku, CDROM ignorowany
- name: "=== KROK 3/4: UPLOAD ISO + START VM ==="
  ansible.builtin.import_playbook: cdrom/attach-iso.yml

# Krok 4: Monitorowanie instalacji
- name: "=== KROK 4/4: MONITOROWANIE INSTALACJI ==="
  ansible.builtin.import_playbook: wait-ocp-install.yml
