---
# =============================================================================
# Playbook: Podpięcie ISO i restart VM z bootem z CDROM
# =============================================================================
# Użycie:
#   ansible-playbook attach-iso.yml -e @clusters/ocp1.yml
#
# Wymagania:
#   - ISO wygenerowane przez generate-ocp-agent-iso.yml
#   - VM utworzone przez create-virt-env.yml
#
# Co robi:
#   1. Uploaduje ISO do PVC (jeśli nie istnieje)
#   2. Podpina CDROM do każdej VM
#   3. Ustawia boot order: rootdisk pierwszy, CDROM drugi
#      (pusty rootdisk → BIOS fallback do CDROM → instalacja → reboot z rootdisk)
#   4. Restartuje VM
# =============================================================================

- name: Podpięcie ISO i restart VM
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    install_dir: "/tmp/ocp-install/{{ cluster_name }}"

  tasks:
    # =========================================================================
    # Krok 1: Walidacja — znajdz wygenerowane ISO (dowolna nazwa agent*.iso)
    # =========================================================================
    - name: "=== PODPINANIE ISO DLA KLASTRA {{ cluster_name }} ==="
      ansible.builtin.debug:
        msg: "Namespace: {{ namespace }}, Nodes: {{ nodes | length }}"

    - name: Znajdz wygenerowane ISO w katalogu instalacyjnym
      ansible.builtin.find:
        paths: "{{ install_dir }}"
        patterns: "agent*.iso"
        file_type: file
      register: iso_search

    - name: Blad — brak ISO
      ansible.builtin.fail:
        msg: |
          Nie znaleziono pliku agent*.iso w {{ install_dir }}
          Najpierw uruchom: ansible-playbook generate-ocp-agent-iso.yml -e @clusters/{{ cluster_name }}.yml
      when: iso_search.matched == 0

    - name: Ustal sciezke do znalezionego ISO
      ansible.builtin.set_fact:
        iso_file: "{{ iso_search.files[0].path }}"

    - name: Pokaz znalezione ISO
      ansible.builtin.debug:
        msg: "Bede uzywal: {{ iso_file }}"

    # =========================================================================
    # Krok 2: Zatrzymaj VM (jezeli sa Running) zanim ruszymy DV.
    #         Bez tego delete starego DV moze sie zablokowac, gdy istniejacy
    #         VMI ma juz to ISO jako CDROM z poprzedniego runu.
    # =========================================================================
    - name: Zatrzymaj VM (przed manipulacja DV)
      kubernetes.core.k8s:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        namespace: "{{ namespace }}"
        name: "{{ item.name }}"
        state: present
        merge_type: merge
        definition:
          spec:
            runStrategy: Halted
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Poczekaj az kazdy VMI zniknie (przed DV ops)
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        namespace: "{{ namespace }}"
        name: "{{ item.name }}"
      register: vmi_pre_dv_check
      until: vmi_pre_dv_check.resources | length == 0
      retries: 30
      delay: 5
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    # =========================================================================
    # Krok 3: Synchronizuj DataVolume z aktualnym ISO (checksum-based).
    #
    # Stara logika "skip jezeli DV istnieje" powodowala ze przy ponownej
    # instalacji (nowe VMs, nowy ISO) podpinalismy STARE ISO z poprzedniego
    # runu. Teraz porownujemy SHA256 lokalnego ISO z adnotacja na DV i:
    #   - DV nie istnieje                      -> upload + annotate
    #   - DV istnieje, SHA pasuje              -> skip (idempotent)
    #   - DV istnieje, SHA rozni sie / brak    -> delete + upload + annotate
    # =========================================================================
    - name: Policz SHA256 lokalnego ISO
      ansible.builtin.command:
        cmd: "sha256sum {{ iso_file }}"
      register: iso_sha_result
      changed_when: false

    - name: Ustal SHA256 ISO
      ansible.builtin.set_fact:
        iso_sha256: "{{ iso_sha_result.stdout.split()[0] }}"

    - name: Pobierz info o DV (jezeli istnieje)
      kubernetes.core.k8s_info:
        api_version: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        namespace: "{{ namespace }}"
        name: "{{ iso_pvc_name }}"
      register: iso_dv_info

    - name: Wyznacz decyzje (upload / skip / replace)
      ansible.builtin.set_fact:
        dv_exists: "{{ iso_dv_info.resources | length > 0 }}"
        dv_sha: >-
          {{ (iso_dv_info.resources[0].metadata.annotations | default({}))['iso-sha256']
             | default('') if (iso_dv_info.resources | length > 0) else '' }}

    - name: Wyznacz dv_needs_upload
      ansible.builtin.set_fact:
        dv_needs_upload: "{{ (not dv_exists) or (dv_sha != iso_sha256) }}"

    - name: "=== STATUS DATAVOLUME ==="
      ansible.builtin.debug:
        msg: |
          Lokalny ISO SHA: {{ iso_sha256 }}
          DV ISO SHA:      {{ dv_sha if dv_exists else 'DV NIE ISTNIEJE' }}
          Akcja:           {{ 'DELETE+UPLOAD (DV jest stale)' if (dv_exists and dv_needs_upload)
                              else 'UPLOAD (DV nie istnieje)' if dv_needs_upload
                              else 'SKIP (DV juz ma to ISO)' }}

    - name: Usun przestarzala DataVolume
      kubernetes.core.k8s:
        state: absent
        api_version: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        namespace: "{{ namespace }}"
        name: "{{ iso_pvc_name }}"
        wait: true
        wait_timeout: 300
      when:
        - dv_exists
        - dv_needs_upload

    - name: Upload ISO do DataVolume przez virtctl
      ansible.builtin.command:
        cmd: >
          virtctl image-upload dv {{ iso_pvc_name }}
          --size=2Gi
          --image-path={{ iso_file }}
          -n {{ namespace }}
          --access-mode=ReadWriteMany
          --insecure
      when: dv_needs_upload
      register: upload_result

    - name: Poczekaj na zakonczenie importu DataVolume
      kubernetes.core.k8s_info:
        api_version: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        namespace: "{{ namespace }}"
        name: "{{ iso_pvc_name }}"
      register: dv_status
      until: >
        dv_status.resources | length > 0 and
        dv_status.resources[0].status.phase | default('') == 'Succeeded'
      retries: 30
      delay: 10
      when: dv_needs_upload

    - name: Annotuj DV checksumem ISO (znacznik co jest w srodku)
      kubernetes.core.k8s:
        state: present
        api_version: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        namespace: "{{ namespace }}"
        name: "{{ iso_pvc_name }}"
        merge_type: merge
        definition:
          metadata:
            annotations:
              iso-sha256: "{{ iso_sha256 }}"
      when: dv_needs_upload

    - name: Upload zakonczony
      ansible.builtin.debug:
        msg: "ISO uploadowane do DataVolume {{ iso_pvc_name }} (SHA: {{ iso_sha256 }})"
      when: dv_needs_upload

    - name: DataVolume aktualne — pomijam upload
      ansible.builtin.debug:
        msg: "DV {{ iso_pvc_name }} juz ma to ISO (SHA: {{ iso_sha256 }}) — pomijam upload"
      when: not dv_needs_upload

    # =========================================================================
    # Krok 4: Dodaj CDROM do VM
    # =========================================================================
    - name: "=== DODAWANIE CDROM ==="
      ansible.builtin.debug:
        msg: "Dodaję CDROM z ISO do VM..."

    - name: Dodaj CDROM disk i volume do VM (oc patch)
      ansible.builtin.command:
        cmd: >
          oc patch vm {{ item.name }} -n {{ namespace }} --type=json -p='[
            {"op": "replace", "path": "/spec/template/spec/domain/devices/disks", "value": [
              {"name": "rootdisk", "disk": {"bus": "virtio"}, "bootOrder": 1},
              {"name": "cdrom-iso", "cdrom": {"bus": "sata"}, "bootOrder": 2}
            ]},
            {"op": "replace", "path": "/spec/template/spec/volumes", "value": [
              {"name": "rootdisk", "dataVolume": {"name": "{{ item.name }}-rootdisk"}},
              {"name": "cdrom-iso", "dataVolume": {"name": "{{ iso_pvc_name }}"}}
            ]}
          ]'
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"
      register: patch_result
      changed_when: true

    # =========================================================================
    # Krok 5: Uruchom VM
    # =========================================================================
    - name: "=== URUCHAMIANIE VM ==="
      ansible.builtin.debug:
        msg: "Uruchamiam VM — pusty rootdisk fallbackuje do CDROM, agent installer zapisze na rootdisk..."

    - name: Uruchom VM
      kubernetes.core.k8s:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        namespace: "{{ namespace }}"
        name: "{{ item.name }}"
        state: present
        merge_type: merge
        definition:
          spec:
            runStrategy: Always
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Poczekaj na uruchomienie VMI
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        namespace: "{{ namespace }}"
        name: "{{ item.name }}"
      register: vmi_status
      until: >
        vmi_status.resources | length > 0 and
        vmi_status.resources[0].status.phase | default('') == 'Running'
      retries: 60
      delay: 10
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    # =========================================================================
    # Krok 6: Podsumowanie
    # =========================================================================
    - name: "=== SUKCES ==="
      ansible.builtin.debug:
        msg: |
          VM uruchomione z ISO!

          Następne kroki:
          1. Monitoruj instalację:
             ansible-playbook wait-ocp-install.yml -e @clusters/{{ cluster_name }}.yml

          2. Lub ręcznie:
             openshift-install agent wait-for install-complete --dir={{ install_dir }}

          3. Konsola VM:
             virtctl console {{ nodes[0].name }} -n {{ namespace }}
