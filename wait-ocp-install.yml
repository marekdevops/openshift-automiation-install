---
# =============================================================================
# Playbook: Monitorowanie instalacji OpenShift
# =============================================================================
# Użycie:
#   ansible-playbook wait-ocp-install.yml -e @clusters/ocp1.yml
#
# Opcje:
#   -e stage=bootstrap    # czekaj tylko na bootstrap
#   -e stage=complete     # czekaj na pełną instalację (domyślnie)
# =============================================================================

- name: Monitorowanie instalacji OpenShift
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    stage: complete
    openshift_install_binary: /usr/local/bin/openshift-install
    install_dir: "/tmp/ocp-install/{{ cluster_name }}"

  tasks:
    - name: "=== MONITOROWANIE INSTALACJI ==="
      ansible.builtin.debug:
        msg: "Klaster: {{ cluster_name }}.{{ base_domain }} | Etap: {{ stage }}"

    - name: Sprawdź czy katalog instalacyjny istnieje
      ansible.builtin.stat:
        path: "{{ install_dir }}"
      register: install_dir_stat

    - name: Błąd — brak katalogu instalacyjnego
      ansible.builtin.fail:
        msg: |
          Nie znaleziono katalogu instalacyjnego: {{ install_dir }}
          Najpierw uruchom: ansible-playbook generate-ocp-agent-iso.yml -e @group_vars/ocp_cluster1.yml
      when: not install_dir_stat.stat.exists

    # =========================================================================
    # Czekaj na bootstrap (opcjonalnie)
    # =========================================================================
    - name: "=== CZEKAM NA BOOTSTRAP ==="
      ansible.builtin.debug:
        msg: "To może potrwać 15-30 minut..."
      when: stage == 'bootstrap' or stage == 'complete'

    - name: Czekaj na zakończenie bootstrap
      ansible.builtin.command:
        cmd: "{{ openshift_install_binary }} agent wait-for bootstrap-complete --dir={{ install_dir }}"
      register: bootstrap_result
      when: stage == 'bootstrap' or stage == 'complete'
      changed_when: false

    - name: Bootstrap zakończony
      ansible.builtin.debug:
        msg: "Bootstrap zakończony pomyślnie!"
      when: stage == 'bootstrap' or stage == 'complete'

    # =========================================================================
    # Czekaj na pełną instalację
    # =========================================================================
    - name: "=== CZEKAM NA PEŁNĄ INSTALACJĘ ==="
      ansible.builtin.debug:
        msg: "To może potrwać 30-60 minut..."
      when: stage == 'complete'

    - name: Czekaj na zakończenie instalacji
      ansible.builtin.command:
        cmd: "{{ openshift_install_binary }} agent wait-for install-complete --dir={{ install_dir }}"
      register: install_result
      when: stage == 'complete'
      changed_when: false

    # =========================================================================
    # Podsumowanie
    # =========================================================================
    - name: "=== INSTALACJA ZAKOŃCZONA ==="
      ansible.builtin.debug:
        msg: |
          Klaster {{ cluster_name }}.{{ base_domain }} zainstalowany!

          Credentials:
          {{ install_result.stdout | default('Sprawdź: ' + install_dir + '/auth/') }}

          Pliki:
          - kubeconfig: {{ install_dir }}/auth/kubeconfig
          - kubeadmin password: {{ install_dir }}/auth/kubeadmin-password

          Logowanie:
          export KUBECONFIG={{ install_dir }}/auth/kubeconfig
          oc whoami
      when: stage == 'complete'

    - name: Wczytaj hasło kubeadmin
      ansible.builtin.slurp:
        src: "{{ install_dir }}/auth/kubeadmin-password"
      register: kubeadmin_pass
      when: stage == 'complete'
      ignore_errors: true

    # =========================================================================
    # Weryfikacja stanu operatorów klastra
    # =========================================================================
    - name: "=== WERYFIKACJA OPERATORÓW KLASTRA ==="
      ansible.builtin.debug:
        msg: "Sprawdzam stan wszystkich operatorów klastra..."
      when: stage == 'complete'

    - name: Poczekaj aż wszyscy operatorzy będą Available
      ansible.builtin.command:
        cmd: >
          oc get clusteroperators
          --kubeconfig={{ install_dir }}/auth/kubeconfig
          -o jsonpath='{.items[?(@.status.conditions[?(@.type=="Available")].status=="False")].metadata.name}'
      register: degraded_operators
      until: degraded_operators.stdout | trim == ''
      retries: 60
      delay: 30
      when: stage == 'complete'
      changed_when: false
      ignore_errors: true

    - name: Pokaż stan operatorów
      ansible.builtin.command:
        cmd: >
          oc get clusteroperators
          --kubeconfig={{ install_dir }}/auth/kubeconfig
      register: co_status
      changed_when: false
      when: stage == 'complete'
      ignore_errors: true

    - name: Stan operatorów
      ansible.builtin.debug:
        msg: "{{ co_status.stdout_lines }}"
      when:
        - stage == 'complete'
        - co_status is defined

    - name: Ostrzeżenie — niesprawne operatory
      ansible.builtin.debug:
        msg: |
          UWAGA: Następujące operatory nie są Available:
          {{ degraded_operators.stdout }}

          Sprawdź: oc get clusteroperators --kubeconfig={{ install_dir }}/auth/kubeconfig
          Logi:    oc describe co <nazwa> --kubeconfig={{ install_dir }}/auth/kubeconfig
      when:
        - stage == 'complete'
        - degraded_operators is defined
        - degraded_operators.stdout | default('') | trim != ''

    # =========================================================================
    # Eksport kubeconfig
    # =========================================================================
    - name: Skopiuj kubeconfig do ~/.kube/{{ cluster_name }}
      ansible.builtin.copy:
        src: "{{ install_dir }}/auth/kubeconfig"
        dest: "{{ ansible_env.HOME }}/.kube/{{ cluster_name }}"
        mode: '0600'
      when: stage == 'complete'
      ignore_errors: true

    - name: "=== DANE DOSTĘPOWE ==="
      ansible.builtin.debug:
        msg: |
          Console: https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}
          API:     https://api.{{ cluster_name }}.{{ base_domain }}:6443
          User:    kubeadmin
          Password: {{ kubeadmin_pass.content | b64decode | trim | default('sprawdź plik auth/kubeadmin-password') }}

          Kubeconfig:
          export KUBECONFIG={{ install_dir }}/auth/kubeconfig
          # lub: export KUBECONFIG=~/.kube/{{ cluster_name }}

          Weryfikacja:
          oc whoami --kubeconfig={{ install_dir }}/auth/kubeconfig
          oc get nodes --kubeconfig={{ install_dir }}/auth/kubeconfig
      when:
        - stage == 'complete'
        - kubeadmin_pass is defined
